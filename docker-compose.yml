services:
  postgres-postgis:
    image: postgis/postgis:17-3.5
    container_name: postgres_postgis_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "071104"
      POSTGRES_DB: monitoring_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d monitoring_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: daycare_monitoring_api
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:071104@postgres-postgis:5432/monitoring_db
    command: bash -c "alembic upgrade head && python -m app.db.init_db && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      postgres-postgis:
        condition: service_healthy

volumes:
  postgres_data:
